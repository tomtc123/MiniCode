<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1a2e"/>
      <stop offset="100%" stop-color="#0f2847"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#26c6da"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#80deea"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#26c6da" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20" result="blur"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Border glow -->
  <rect x="3" y="3" width="506" height="506" rx="105" ry="105" fill="none" stroke="url(#border)" stroke-width="2"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.035" stroke="#00e5ff" stroke-width="0.8">
    <line x1="0" y1="64" x2="512" y2="64"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="192" x2="512" y2="192"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="0" y1="448" x2="512" y2="448"/>
    <line x1="64" y1="0" x2="64" y2="512"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="192" y1="0" x2="192" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="448" y1="0" x2="448" y2="512"/>
  </g>

  <!-- Left bracket < -->
  <g filter="url(#glowFilter)">
    <path d="M165 160 L90 256 L165 352" fill="none" stroke="url(#glow)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Right bracket /> -->
  <g filter="url(#glowFilter)">
    <path d="M347 160 L422 256 L347 352" fill="none" stroke="url(#glow)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Slash -->
    <line x1="285" y1="352" x2="375" y2="160" stroke="url(#glow)" stroke-width="26" stroke-linecap="round"/>
  </g>

  <!-- Central AI diamond -->
  <g filter="url(#softGlow)" transform="translate(256,256)">
    <!-- Core diamond -->
    <path d="M0,-28 L20,0 L0,28 L-20,0 Z" fill="url(#sparkle)" opacity="0.95"/>
    <!-- Cross rays -->
    <line x1="0" y1="-42" x2="0" y2="-52" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    <line x1="0" y1="42" x2="0" y2="52" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    <line x1="-42" y1="0" x2="-52" y2="0" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    <line x1="42" y1="0" x2="52" y2="0" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    <!-- Diagonal rays -->
    <line x1="-22" y1="-22" x2="-30" y2="-30" stroke="#80deea" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="22" y1="-22" x2="30" y2="-30" stroke="#80deea" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-22" y1="22" x2="-30" y2="30" stroke="#80deea" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="22" y1="22" x2="30" y2="30" stroke="#80deea" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Cursor blink line -->
  <rect x="270" y="242" width="3.5" height="28" rx="1.75" fill="#00e5ff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.15;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
